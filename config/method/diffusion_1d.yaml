USER_NAME: user
device: "cuda:0"

dataset:
  _target_: denoising_diffusion_pytorch.data_loader.image_data_loader.Dataset1D
  dataset_path: "f:/home/user/dataset/denoising_diffusion_pytorch/dataset/real_models/dataset_v2/sheetsander_cast_images_z_49"
  image_size: 343
  grid_3dim: 49
  is_shuffle: true
  horizontal_flip: false
  convert_image_to: null

model:
  _target_: denoising_diffusion_pytorch.models.unet_1d.Unet1D
  dim: 128
  dim_mults: [1, 2, 4, 8]
  self_condition: false
  flash_attn: true

diffusion:
  _target_: denoising_diffusion_pytorch.models.diffusion_1d.GaussianDiffusion1D
  beta_schedule: sigmoid
  timesteps: 1000
  sampling_timesteps: 20

trainer:
  _target_: denoising_diffusion_pytorch.trainer.diffusion_1d_trainer.Trainer1D
  batch_size: 3
  learning_rate: 8e-5
  train_step: 800000
  gradient_accumulate_every: 30
  ema_decay: 0.995
  amp: true

logbase: logs
prefix: diffusion_1d/
tag: H100_real_models_dataset_v2_1
exp_name: null
