defaults:
  - cases  : simple

policy    : policy.cutting_surface_planner_v9.cutting_surface_planner
batch_size: 32

policy_config:
  ctrl_mode    : epsilon_greedy_00
  infer_model  : vaeac
  decision_mode:
    mode: clip_ucb_raw
    param:
      ucb_lb: 0.5
  cfg_omega: 0.2

eval_data_path: /home/dev/.../geom_test_1

loadpath: /home/dev/.../logs/Image_diffusion_2D/vaeac/D64_...
epoch   : "10000"

task_step: 8
observation_mode: partial_obs
iter: [0, 6] # Objectごとの評価回数

