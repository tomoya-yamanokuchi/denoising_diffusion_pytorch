usecase:
  name: train
grid:
  grid_config:
    s_grid_config:
      bounds:
      - -0.05
      - 0.05
      - -0.05
      - 0.05
      - -0.05
      - 0.05
      side_length: 16
method:
  dataset:
    name: celeba
    path: /home/dev/workspace/dataset/nedo/dataset_4142435161_13900k/voxel_images_w_multi_color_v1
    class: Image_diffusion_2D
    min: -1
    max: 1
    h: 32
    type: pattern
    p: 0.2
    image_size: 64
  name: vaeac
  USER_NAME: user
  device: cuda:0
  model:
    name: EncoderDecoderNet
    last_layer: tanh
    inp_channels: 3
    n_hidden: 32
    fc_hidden: 100
    fc_out: 50
    optimizer: adam
    lr: 5.0e-05
    beta1: 0.9
    beta2: 0.999
    scheduler: step
    decay-steps: 500
    decay-factor: 0.995
    weight-decay: 1.0e-05
    init: orthogonal
    loss: mse
    lr_override: false
  reg:
    lambda_kl: 1
    lambda_reg: 1
    sigma_m: 10000
    sigma_s: 0.0001
    apply_reg: true
  trainer:
    pretrained: null
    train:
      train_step: 800000
      batch_size: 96
      gradient_accumulate_every: 2
      shuffle: true
      step-log: 5
      peek-validation: 10000
  log:
    logbase: logs
    prefix: vaeac/
    tag: H100_simple_models_dataset_13901k_v1
    exp_name: null
    layout: dataset
    suffix: null
  watch:
  - key: log.prefix
    label: ''
  - key: dataset.image_size
    label: D
  - key: log.tag
    label: ''
